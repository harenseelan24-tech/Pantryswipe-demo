kind = "mobile"
previewPath = "/"
title = "PantrySwipe"
version = "1.0.0"
id = "artifacts/pantryswipe"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25287

[services.development]
run = "pnpm --filter @workspace/pantryswipe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pantryswipe", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pantryswipe", "run", "serve" ]

[services.env]
PORT = "25287"
BASE_PATH = "/"
